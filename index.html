<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>My Netflix V21.0 - DATABASE MODE</title>
<link rel="icon" href="data:,">

<script src="https://cdn.embed.ly/player-0.1.0.min.js"></script>

<style>
/* --- BASE & LAYOUT --- */
html, body { height: 100%; overflow: hidden; margin: 0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: #000; color: white; user-select: none; }
header { height: 60px; padding: 0 20px; background: rgba(0,0,0,0.95); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10000; }
.header-left { flex: 1; display: flex; align-items: center; font-size: 18px; font-weight: bold; }
.header-center { flex: 2; text-align: center; }
.header-right { flex: 1; display: flex; gap: 12px; align-items: center; justify-content: flex-end; }
#currentEpisodeDisplay { display: none; background: rgba(40, 40, 40, 0.6); backdrop-filter: blur(10px); padding: 6px 20px; border-radius: 8px; font-size: 14px; color: #efefef; border: 1px solid rgba(255, 255, 255, 0.1); }
#cinemaBtn { background: #333; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; }
#headerNextBtn { background: #ff1f1f; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-size: 14px; cursor: pointer; display: none; }
.search-bar { height: 50px; padding: 0 20px; background: #111; display: flex; gap: 10px; align-items: center; transition: 0.2s; }
.search-bar.hidden { height: 0; padding: 0; overflow: hidden; opacity: 0; }
.search-bar input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; display: none; }
.container { display: flex; height: calc(100vh - 110px); transition: height 0.3s ease; }
.container.full-height { height: calc(100vh - 60px); }
.sidebar { width: 340px; min-width: 340px; background: #141414; padding: 10px; overflow-y: auto; border-right: 1px solid #222; box-sizing: border-box; }
.sidebar.hidden { margin-left: -340px; opacity: 0; }
.video-area { flex: 1; background: #000; position: relative; }
.video-area iframe { width: 100%; height: 100%; border: none; }
.item { padding: 12px; margin: 8px 0; background: #222; border-radius: 8px; cursor: pointer; position: relative; transition: 0.2s; display: flex; align-items: center; justify-content: space-between; border: 1px solid transparent; }
.item:hover { background: #2a2a2a; }
.item.active { background: #ff1f1f; border-color: rgba(255,255,255,0.2); }
.item.watched { opacity: 0.4; }
.item.active.watched { opacity: 1; }

.time-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 65px; padding: 4px; border-radius: 4px; font-size: 11px; text-align: center; outline: none; }

.status-icon { 
    background: rgba(0,0,0,0.4); 
    width: 24px; 
    height: 24px; 
    display: inline-flex; 
    align-items: center; 
    justify-content: center; 
    border-radius: 6px; 
    color: white; 
    font-size: 16px;
    line-height: 0;
    font-weight: bold;
    transition: all 0.2s ease;
}
.watched .status-icon { color: #4CAF50; background: rgba(76, 175, 80, 0.15); }

.resume-card { padding: 12px; margin: 8px 0; background: #1a1a1a; border-radius: 10px; border-left: 3px solid #ff1f1f; position: relative; cursor: pointer; }
.delete-resume { position: absolute; right: 10px; top: 10px; width: 20px; height: 20px; background: rgba(255,255,255,0.05); color: #666; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.unmark-btn { width: 100%; padding: 12px; margin-top: 15px; background: transparent; color: #555; border: 1px dashed #333; border-radius: 8px; cursor: pointer; font-size: 12px; }
hr { border: 0; height: 1px; background: #333; margin: 15px 0; }
</style>
</head>
<body>

<header>
    <div class="header-left">🎬 My Netflix <span style="color:#ff1f1f; margin-left:5px;">V21.0</span></div>
    <div class="header-center"><span id="currentEpisodeDisplay"></span></div>
    <div class="header-right">
        <button id="cinemaBtn" onclick="toggleCinema()">🎬 Mode Cinéma</button>
        <button id="headerNextBtn" onclick="loadNextVideo()">Suivant ➔</button>
    </div>
</header>

<div class="search-bar" id="searchBarArea">
  <button id="searchBtn" style="background:#333; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">🔍 Rechercher</button>
  <input id="search" oninput="deepSearch()" placeholder="Rechercher partout..." />
</div>

<div class="container" id="mainContainer">
    <div class="sidebar" id="list">Chargement du catalogue...</div>
    <div class="video-area" id="videoArea">
        <div style="display:flex; height:100%; align-items:center; justify-content:center; opacity:0.3;">Sélectionne une vidéo</div>
    </div>
</div>

<script>
// --- NETTOYAGE CONSOLE ---
const originalError = console.error;
console.error = function(...args) {
    if (args[0] && typeof args[0] === 'string' && (args[0].includes('WebSocket') || args[0].includes('socket'))) return;
    originalError.apply(console, args);
};

let data = {};
let view = "creators", creator = null, category = null, currentVideo = null;
let player = null; // VARIABLE GLOBALE : Lien direct avec la vidéo

const RESUME_KEY = "nf_res_v21";
const WATCHED_KEY = "nf_wat_v21";
const TIMECODE_KEY = "nf_time_v21";

const getResume = () => JSON.parse(localStorage.getItem(RESUME_KEY)) || {};
const getWatched = () => JSON.parse(localStorage.getItem(WATCHED_KEY)) || [];
const getTimecodes = () => JSON.parse(localStorage.getItem(TIMECODE_KEY)) || {};

function formatSeconds(s) {
    if (!s || isNaN(s)) return "0:00";
    const date = new Date(null);
    date.setSeconds(s);
    return s >= 3600 ? date.toISOString().substr(11, 8) : date.toISOString().substr(14, 5);
}

function parseTimeToSeconds(str) {
    if (!str || !str.includes(':')) return 0;
    const parts = str.split(':').reverse();
    let sec = 0;
    sec += parseInt(parts[0]) || 0;
    sec += (parseInt(parts[1]) || 0) * 60;
    if (parts[2]) sec += (parseInt(parts[2]) || 0) * 3600;
    return sec;
}

async function loadDatabase() {
    try {
        const response = await fetch('data.json');
        if (!response.ok) throw new Error("Fichier data.json introuvable");
        data = await response.json();
        render();
        const last = Object.values(getResume()).sort((a,b)=>b.time-a.time)[0];
        if(last) { 
            creator=last.creator; category=last.category; view="videos"; 
            loadVideo(last.video, false); 
        }
    } catch (e) {
        document.getElementById("list").innerHTML = `<div style="color:red; padding:20px;">Erreur base de données</div>`;
    }
}

function deepSearch() {
    const val = document.getElementById("search").value.toLowerCase();
    if(!val) { render(); return; } 
    const list = document.getElementById("list");
    list.innerHTML = `<div style="font-size:10px; opacity:0.4; margin:10px 0 5px 5px; font-weight:bold;">RÉSULTATS</div>`;
    Object.keys(data).forEach(cK => {
        Object.keys(data[cK].categories).forEach(catK => {
            data[cK].categories[catK].videos.forEach(v => {
                if(v.title.toLowerCase().includes(val) || data[cK].name.toLowerCase().includes(val)) {
                    const el = document.createElement("div"); el.className = "item";
                    el.innerHTML = `<div>▶ ${v.title}</div><small style="opacity:0.4; font-size:10px;">${data[cK].name} • ${data[cK].categories[catK].title}</small>`;
                    el.onclick = () => { creator = cK; category = catK; view = "videos"; loadVideo(v); };
                    list.appendChild(el);
                }
            });
        });
    });
}

function loadVideo(v, markOldAsDone = false) {
    if(!v) return;
    currentVideo = v;
    const display = document.getElementById("currentEpisodeDisplay");
    display.innerText = v.title; display.style.display = "inline-block";
    
    const resume = getResume();
    resume[creator + "__" + category] = { 
        video: v, creator, creatorName: data[creator].name,
        categoryName: data[creator].categories[category].title,
        category, time: Date.now() 
    };
    localStorage.setItem(RESUME_KEY, JSON.stringify(resume));
    
    const videoUrl = `https://cdn.embedly.com/widgets/media.html?src=https%3A%2F%2Fstreamable.com%2Fe%2F${v.id}&display_name=Streamable&url=${encodeURIComponent("https://streamable.com/"+v.id)}&key=96a16496e36611e091d14040d3dc5c07&type=text%2Fhtml&schema=streamable`;
    
    document.getElementById("videoArea").innerHTML = `<iframe id="main-player" src="${videoUrl}" allowfullscreen scrolling="no"></iframe>`;
    
    const iframe = document.getElementById("main-player");
    
    // ON RELIE L'INSTANCE À LA VARIABLE GLOBALE PLAYER
    player = new playerjs.Player(iframe);

    player.on('ready', () => {
        const timecodes = getTimecodes();
        const savedTime = timecodes[v.id];
        if (savedTime && !isNaN(savedTime)) {
            player.setCurrentTime(parseFloat(savedTime));
        }

        player.on('timeupdate', (res) => {
            if (res.seconds > 0) {
                saveTimecode(v.id, res.seconds);
                const activeInput = document.querySelector(`.item.active .time-input`);
                if (activeInput) {
                    activeInput.value = formatSeconds(res.seconds);
                }
            }
        });

        player.on('ended', () => {
            saveTimecode(v.id, 0); 
        });
    });

    checkNextVideo();
    render();
}

function saveTimecode(id, value) {
    const secValue = typeof value === 'string' ? parseTimeToSeconds(value) : value;
    let t = getTimecodes(); 
    t[id] = secValue;
    localStorage.setItem(TIMECODE_KEY, JSON.stringify(t));
}

function toggleWatched(id, event) {
    event.stopPropagation();
    let w = getWatched();
    if (w.includes(id)) w = w.filter(i => i !== id); else w.push(id);
    localStorage.setItem(WATCHED_KEY, JSON.stringify(w));
    render();
}

function deleteFromResume(key, event) {
    event.stopPropagation();
    let r = getResume(); delete r[key];
    localStorage.setItem(RESUME_KEY, JSON.stringify(r));
    render();
}

function unmarkAllInCategory() {
    if(!confirm("Réinitialiser les épisodes vus ici ?")) return;
    let w = getWatched();
    const currentVideos = data[creator].categories[category].videos.map(v => v.id);
    w = w.filter(id => !currentVideos.includes(id));
    localStorage.setItem(WATCHED_KEY, JSON.stringify(w));
    render();
}

function checkNextVideo() {
    const btn = document.getElementById("headerNextBtn");
    if (!currentVideo || !category) return;
    const vids = data[creator].categories[category].videos;
    const idx = vids.findIndex(v => v.id === currentVideo.id);
    btn.style.display = (idx !== -1 && idx < vids.length - 1) ? "block" : "none";
}

function loadNextVideo() {
    const vids = data[creator].categories[category].videos;
    const idx = vids.findIndex(v => v.id === currentVideo.id);
    if (idx !== -1 && idx < vids.length - 1) loadVideo(vids[idx + 1], true);
}

function toggleCinema() {
    const isCinema = document.querySelector(".sidebar").classList.toggle("hidden");
    document.getElementById("searchBarArea").classList.toggle("hidden");
    document.getElementById("mainContainer").classList.toggle("full-height");
    document.getElementById("cinemaBtn").innerHTML = isCinema ? "📂 Afficher Liste" : "🎬 Mode Cinéma";
}

function render() {
    const list = document.getElementById("list");
    const watched = getWatched();
    const resume = getResume();
    const timecodes = getTimecodes();
    list.innerHTML = "";

    if (view !== "creators") {
        const b = document.createElement("div"); b.className = "item"; b.innerHTML = "⬅ Retour";
        b.style.background = "#333";
        b.onclick = () => { if(view==="videos") {view="categories"; category=null;} else {view="creators"; creator=null;} render(); };
        list.appendChild(b);
    }

    if (view === "creators") {
        const last = Object.entries(resume).sort((a,b)=>b[1].time - a[1].time).slice(0,4);
        if(last.length > 0) {
            list.innerHTML += `<div style="font-size:10px; opacity:0.4; margin:10px 0 5px 5px; font-weight:bold;">REPRENDRE</div>`;
            last.forEach(([k, item]) => {
                const el = document.createElement("div"); el.className = "resume-card";
                el.innerHTML = `<div class="delete-resume">✕</div><div style="font-weight:bold;">${item.video.title}</div><small style="opacity:0.5;">${item.creatorName} • ${item.categoryName}</small>`;
                el.onclick = () => { creator=item.creator; category=item.category; view="videos"; loadVideo(item.video, false); };
                el.querySelector('.delete-resume').onclick = (e) => deleteFromResume(k, e);
                list.appendChild(el);
            });
            list.appendChild(document.createElement("hr"));
        }
        Object.keys(data).forEach(k => {
            const el = document.createElement("div"); el.className = "item"; el.innerHTML = `👤 ${data[k].name}`;
            el.onclick = () => { creator=k; view="categories"; render(); };
            list.appendChild(el);
        });
    } else if (view === "categories") {
        Object.keys(data[creator].categories).forEach(k => {
            const el = document.createElement("div"); el.className = "item"; el.innerHTML = `📁 ${data[creator].categories[k].title}`;
            el.onclick = () => { category=k; view="videos"; render(); };
            list.appendChild(el);
        });
    } else if (view === "videos") {
        data[creator].categories[category].videos.forEach(v => {
            const isW = watched.includes(v.id);
            const el = document.createElement("div"); 
            el.className = `item ${currentVideo?.id === v.id ? 'active' : ''} ${isW ? 'watched' : ''}`;
            const displayTime = formatSeconds(timecodes[v.id]);
            el.innerHTML = `<span>▶ ${v.title}</span>
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="text" class="time-input" placeholder="0:00" value="${displayTime !== '0:00' ? displayTime : ''}" onclick="event.stopPropagation()" onblur="saveTimecode('${v.id}', this.value)">
                    <div class="status-icon">${isW ? '✓' : '+'}</div>
                </div>`;
            el.onclick = () => loadVideo(v);
            el.querySelector('.status-icon').onclick = (e) => toggleWatched(v.id, e);
            list.appendChild(el);
        });
        const rBtn = document.createElement("button"); rBtn.className = "unmark-btn"; rBtn.innerText = "♻ Réinitialiser la série";
        rBtn.onclick = unmarkAllInCategory; list.appendChild(rBtn);
    }
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("searchBtn").onclick = () => {
        const inp = document.getElementById("search");
        inp.style.display = (inp.style.display === "block") ? "none" : "block";
        if(inp.style.display === "block") inp.focus();
    };
    loadDatabase();
});
</script>
</body>
</html>
